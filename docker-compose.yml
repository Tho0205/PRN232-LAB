version: '3.8'

services:
  # Cấu hình cho Database
  lms-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Aa@123456 # Mật khẩu mạnh này phải khớp với mật khẩu API gọi vào
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  # Cấu hình cho API
  lms-api:
    build:
      context: .
      dockerfile: LAB1/Dockerfile
    ports:
      - "8080:8080" # Cổng để bạn truy cập Swagger từ máy thật
    environment:
      # Ghi đè ConnectionString để gọi vào lms-db thay vì localhost
      - ConnectionStrings__DefaultConnection=Server=lms-db,1433;Database=PRN232_LAB1_LMS;User Id=sa;Password=Aa@123456;TrustServerCertificate=True
    depends_on:
      - lms-db

volumes:
  sqldata:
